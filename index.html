<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PL/SQL Interactivo — Arquitectura de Bases de Datos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <div class="logo-title">PL/SQL</div>
          <div class="logo-sub">Interactivo · ABD</div>
        </div>
      </div>
      <div class="score-widget">
        <span class="score-lbl">Puntuación Global</span>
        <span id="global-score" class="score-nums">0 / 0</span>
        <div class="bar-bg"><div id="global-bar" class="bar-fill"></div></div>
      </div>
    </div>
    <nav id="block-nav"></nav>
  </aside>

  <main id="main">
    <header id="block-header">
      <span id="header-tag" class="tag"></span>
      <h1 id="header-title"></h1>
      <p id="header-desc"></p>
      <div class="bar-bg thin"><div id="block-bar" class="bar-fill accent2"></div></div>
    </header>

    <div id="tabs-bar"></div>

    <section id="content-area"></section>
  </main>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
